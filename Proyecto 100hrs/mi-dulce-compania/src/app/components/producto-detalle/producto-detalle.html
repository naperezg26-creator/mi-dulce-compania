<div class="container my-5">

  <!-- Volver -->
  <a routerLink="/tienda" class="btn btn-outline-secondary btn-sm mb-4">
    <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
  </a>

  <!-- Cargando -->
  <div *ngIf="cargando" class="text-center py-5">
    <div class="spinner-border text-secondary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert alert-danger text-center">{{ error }}</div>

  <!-- Detalle del producto -->
  <div *ngIf="producto && !cargando" class="row g-5 align-items-start">

    <!-- Imagen -->
    <div class="col-md-5 text-center">
      <img *ngIf="producto.imagen"
           [src]="'http://localhost:3000' + producto.imagen"
           [alt]="producto.nombre"
           class="img-fluid detalle-imagen">
      <div *ngIf="!producto.imagen" class="sin-imagen d-flex align-items-center justify-content-center">
        <i class="bi bi-image text-muted" style="font-size: 4rem;"></i>
      </div>
    </div>

    <!-- Info -->
    <div class="col-md-7">
      <h2 class="producto-titulo mb-3">{{ producto.nombre }}</h2>

      <p class="producto-precio mb-3">${{ producto.precio }}</p>

      <span *ngIf="producto.cantidad > 0" class="badge bg-success mb-3">Disponible ({{ producto.cantidad }} en stock)</span>
      <span *ngIf="producto.cantidad === 0" class="badge bg-secondary mb-3">Agotado</span>

      <hr>

      <h5 class="mt-3 mb-2" style="color: var(--azul-medio); font-weight: 600;">Descripción</h5>
      <p class="descripcion-texto">
        {{ producto.descripcion || 'Sin descripción disponible.' }}
      </p>

      <hr>

      <div class="detalles-extra mt-3">
        <p><strong>Código:</strong> {{ producto.codigo }}</p>
      </div>
    </div>

  </div>

</div>
