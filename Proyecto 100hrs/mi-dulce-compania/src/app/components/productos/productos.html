<div class="container mt-5">

  <h2 class="titulo-tienda text-center mb-4">Gestión de Productos</h2>

  <!-- ALERTA -->
  <div *ngIf="mensaje" [class]="'alert alert-' + (tipoMensaje === 'exito' ? 'success' : 'danger') + ' alert-dismissible'" role="alert">
    <i [class]="'bi ' + (tipoMensaje === 'exito' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill') + ' me-2'"></i>
    {{ mensaje }}
  </div>

  <!-- FORMULARIO CREAR -->
  <div class="card p-4 mb-4 shadow-sm">

    <h5 class="mb-3">Crear Producto</h5>

    <div class="row g-3">

      <div class="col-md-3">
        <input [(ngModel)]="codigo" name="codigo"
               class="form-control"
               placeholder="Código">
      </div>

      <div class="col-md-3">
        <input [(ngModel)]="nombre" name="nombre"
               class="form-control"
               placeholder="Nombre">
      </div>

      <div class="col-md-2">
        <input [(ngModel)]="cantidad" name="cantidad"
               type="number"
               class="form-control"
               placeholder="Cantidad">
      </div>

      <div class="col-md-2">
        <input [(ngModel)]="precio" name="precio"
               type="number"
               class="form-control"
               placeholder="Precio">
      </div>

      <div class="col-md-2">
        <select [(ngModel)]="estado" name="estado"
                class="form-select">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="col-12">
        <textarea [(ngModel)]="descripcion"
                  name="descripcion"
                  class="form-control"
                  placeholder="Descripción">
        </textarea>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Imagen del producto</label>
        <input type="file"
               class="form-control"
               accept="image/*"
               (change)="onImagenSeleccionada($event)">
      </div>
      <div class="col-md-6 d-flex align-items-center" *ngIf="imagenPreview">
        <img [src]="imagenPreview" alt="Preview" style="max-height: 80px; border-radius: 10px;">
      </div>

      <div class="col-12 text-end">
        <button class="btn btn-pastel"
                (click)="crearProducto()">
          Crear Producto
        </button>
      </div>

    </div>
  </div>

  <!-- TABLA -->
  <div class="card p-4 shadow-sm">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Lista de Productos</h5>
      <div class="input-group" style="max-width: 280px;">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input [(ngModel)]="busqueda"
               name="busqueda"
               type="text"
               class="form-control"
               placeholder="Buscar producto...">
      </div>
    </div>

    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Imagen</th>
          <th>Código</th>
          <th>Nombre</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of productosFiltrados">
          <td>
            <img *ngIf="p.imagen" [src]="'http://localhost:3000' + p.imagen" alt="img" style="max-height: 50px; border-radius: 8px;">
            <span *ngIf="!p.imagen" class="text-muted">Sin imagen</span>
          </td>
          <td>{{ p.codigo }}</td>
          <td>{{ p.nombre }}</td>
          <td>{{ p.cantidad }}</td>
          <td>$ {{ p.precio }}</td>
          <td>{{ p.estado }}</td>
          <td>
            <button class="btn btn-danger btn-sm"
                    (click)="eliminarProducto(p._id)">
              Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="productosFiltrados.length === 0">
          <td colspan="7" class="text-center text-muted py-3">No se encontraron productos</td>
        </tr>
      </tbody>

    </table>

  </div>

</div>
