<div class="container my-5">

  <h1 class="text-center titulo-tienda mb-4">Nuestra Colección</h1>

  <!-- Barra de búsqueda -->
  <div class="row mb-4">
    <div class="col-md-8 mx-auto">
      <div class="input-group input-busqueda">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search"></i>
        </span>
        <input type="text"
               class="form-control border-start-0"
               placeholder="Buscar productos..."
               [(ngModel)]="busqueda"
               name="busqueda">
      </div>
    </div>
  </div>

  <!-- Cargando -->
  <div *ngIf="cargando" class="text-center py-5">
    <div class="spinner-border text-secondary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-3 text-muted">Cargando productos...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert alert-danger text-center">
    {{ error }}
  </div>

  <!-- Sin resultados -->
  <div *ngIf="!cargando && !error && productosFiltrados.length === 0" class="text-center py-5">
    <p class="text-muted fs-5">No se encontraron productos.</p>
  </div>

  <!-- Productos -->
  <div class="row g-4">
    <div *ngFor="let producto of productosFiltrados" class="col-sm-6 col-md-4 col-lg-3">
      <a [routerLink]="['/tienda', producto._id]" class="text-decoration-none">
        <div class="card producto-card h-100">
          <img *ngIf="producto.imagen"
               [src]="'http://localhost:3000' + producto.imagen"
               [alt]="producto.nombre"
               class="producto-imagen card-img-top">
          <div class="card-body d-flex flex-column text-center p-4">
            <h5 class="producto-titulo mb-2">{{ producto.nombre }}</h5>
            <p class="producto-precio mt-auto mb-0">${{ producto.precio }}</p>
            <span *ngIf="producto.cantidad === 0" class="badge bg-secondary mt-2">Agotado</span>
            <span *ngIf="producto.cantidad > 0" class="badge bg-success mt-2">Disponible</span>
          </div>
        </div>
      </a>
    </div>
  </div>

</div>
