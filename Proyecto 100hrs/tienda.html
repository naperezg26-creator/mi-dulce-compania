<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Dulce Compañía - Tienda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html">
                Mi Dulce Compañía
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="tienda.html">Tienda</a></li>
                    <li class="nav-item"><a class="nav-link" href="vision.html">Visión</a></li>
                    <li class="nav-item"><a class="nav-link" href="mision.html">Misión</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>

                <div class="d-flex ms-lg-3 gap-2 align-items-center">
                    <a href="#" class="carrito-icon position-relative" id="iconoCarrito">
                        <i class="bi bi-bag fs-4"></i>
                        <span class="badge-carrito position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contadorCarrito">
                            0
                        </span>
                    </a>
                    <a href="login.html" class="btn btn-pastel btn-sm">Login</a>
                    <a href="registro.html" class="btn btn-outline-secondary btn-sm">Registro</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Notificación de producto agregado -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="toastProducto" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle me-2"></i>
                    <span id="mensajeToast">Producto agregado al carrito</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <h1 class="text-center titulo-tienda mb-4">Nuestra Colección</h1>
        
        <!-- Barra de búsqueda -->
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="input-group input-busqueda">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" placeholder="Buscar productos..." id="busquedaProductos">
                </div>
            </div>
        </div>

        <div class="row" id="contenedor-productos"></div>
    </div>

    <footer class="text-center py-4 mt-5">
        <div class="container">
            <p class="mb-1 small text-muted">
                © 2025 Mi Dulce Compañía. Todos los derechos reservados.
            </p>
            <p class="small">
                Hecho con 🤍 para los peluditos de la casa
            </p>
            <div class="mt-3">
                <a href="contacto.html" class="link-footer me-3">Contacto</a>
                <a href="#" class="link-footer me-3">Términos y Condiciones</a>
                <a href="#" class="link-footer">Política de Privacidad</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
